<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#1e293b,#0f172a);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:450px;
    height:700px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
    display:flex;
    flex-direction:column;
}

.header{
    background:#2563eb;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f1f5f9;
}

.message{
    display:flex;
    margin-bottom:15px;
}

.message.you{
    justify-content:flex-end;
}

.message.other{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:10px 15px;
    border-radius:18px;
    word-wrap:break-word;
}

.you .bubble{
    background:#2563eb;
    color:white;
    border-bottom-right-radius:5px;
}

.other .bubble{
    background:white;
    color:black;
    border-bottom-left-radius:5px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.sender{
    font-size:12px;
    font-weight:bold;
    margin-bottom:5px;
}

.time{
    font-size:10px;
    margin-top:5px;
    opacity:.7;
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
    background:white;
}

input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    background:#f1f5f9;
    border-radius:10px;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>

</head>
<body>

<div class="chat-container">

    <div class="header">
        Real-Time Chat
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input
            type="text"
            id="message"
            placeholder="Type a message..."
        >
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
const socket = io();

let username = prompt("Enter your name:");

if(!username){
    username = "Anonymous";
}

socket.on("chat_message", function(data){

    const box = document.getElementById("chatBox");

    const isMe = data.username === username;

    const msg = document.createElement("div");
    msg.className = isMe
        ? "message you"
        : "message other";

    msg.innerHTML = `
        <div class="bubble">

            <div class="sender">
                ${isMe ? "You" : data.username}
            </div>

            <div>
                ${data.message}
            </div>

            <div class="time">
                ${data.time}
            </div>

        </div>
    `;

    box.appendChild(msg);

    box.scrollTop = box.scrollHeight;
});

function sendMessage(){

    const input = document.getElementById("message");

    if(input.value.trim() === "")
        return;

    const now = new Date();

    const time =
        now.toLocaleTimeString([],{
            hour:'2-digit',
            minute:'2-digit'
        });

    socket.emit("chat_message",{
        username:username,
        message:input.value,
        time:time
    });

    input.value = "";
}

document.getElementById("message")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        sendMessage();
    }
});

</script>

</body>
</html>
